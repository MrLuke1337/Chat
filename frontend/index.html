<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="./css/style.css">
    <title>Chat | WhatsApp</title>
</head>
<body>
    
    <section class="container">

        <section class="login">
            <h2>Login</h2>
            <form class="login__form">
                <input type="text" class="login__input" placeholder="Seu nome" required />
                <button type="submit" class="login__button">Entrar</button>
            </form>
        </section>

        <section class="chat">
            <header class="chat__header">
                <div class="chat__user-info">
                    <label for="user-photo-input" class="user-photo-label">
                        <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="user-photo-preview" alt="Perfil">
                        <span class="material-symbols-outlined edit-icon">edit</span>
                    </label>
                    <input type="file" id="user-photo-input" accept="image/*" style="display: none;">
                </div>
            </header>

            <section class="chat__messages"></section>

            <form class="chat__form">
                <div class="chat__attachments-container">
                    <label for="document-input" class="chat__button chat__attachment-label">
                        <span class="material-symbols-outlined">attach_file</span>
                    </label>
                    <input type="file" id="document-input" accept="*/*" style="display: none;" />
                </div>

                <input type="text" class="chat__input" placeholder="Digite uma mensagem" />
                
                <button type="button" id="mic-button" class="chat__button">
                    <span class="material-symbols-outlined">mic</span>
                </button>

                <button type="submit" class="chat__button">
                    <span class="material-symbols-outlined">send</span>
                </button>
            </form>
        </section>

    </section>

    <div id="image-modal" class="modal">
        <span class="modal-close">&times;</span>
        <img class="modal-content" id="modal-image" style="display: none;">
        <video class="modal-content" id="modal-video" controls style="display: none;"></video>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
